<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>科目</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="topbar">
  <a class="back" href="index.html" onclick="if(history.length>1){history.back();return false;}">‹ 返回</a>
  <h1 id="subjTitle">科目</h1>
</div>

<div class="page" id="page"><div class="empty">載入中…</div></div>

<div class="footer-note">法條來源:全國法規資料庫　·　試題來源:考選部考畢試題</div>

<script src="assets/store.js"></script>
<script src="data/manifest.js"></script>
<script>
(function(){
  function esc(s){ return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function qp(k){ var m = location.search.match(new RegExp('[?&]'+k+'=([^&]*)')); return m ? decodeURIComponent(m[1]) : ''; }
  var subj = qp('subject'), view = qp('view');
  document.getElementById('subjTitle').textContent = subj || '科目';
  document.title = subj || '科目';
  var page = document.getElementById('page');

  var all = (window.EXAM_MANIFEST || []).filter(function(x){ return x.subject === subj; });
  var lawBanks = all.filter(function(x){ return x.law; });
  var examBanks = all.filter(function(x){ return !x.law; });
  // 「閱讀類」卡片標籤:國文用「名言佳句」,其餘用「法條」
  var isGuowen = (subj === '國文');
  var rdLabel = isGuowen ? '名言佳句' : '法條';
  var rdIcon = isGuowen ? '📜' : '📖';
  if(!all.length){ page.innerHTML = '<div class="empty">此科目尚無內容。</div>'; return; }

  // ---- 法條清單檢視 ----
  if(view === 'laws'){
    document.getElementById('subjTitle').textContent = subj + '　' + rdLabel;
    var rows = lawBanks.map(function(x){
      return '<a class="card" href="law.html?law=' + encodeURIComponent(x.id) + '">'
           + '<div class="title"><span class="emo">' + rdIcon + '</span> ' + esc(x.name) + '</div>'
           + '<div class="desc">' + esc(x.desc || '點開閱讀(可搜尋)') + '</div></a>';
    }).join('');
    page.innerHTML = '<div class="page-icon">' + rdIcon + '</div><h1 class="page-title">' + esc(subj) + ' · ' + rdLabel + '</h1>'
      + '<p class="page-sub">' + lawBanks.length + (isGuowen ? ' 組 · 作文素材' : ' 部法規 · 全國法規資料庫官方條文') + '</p>'
      + '<div class="grid">' + rows + '</div>';
    return;
  }

  // ---- 科目樞紐(載入各題庫以計題數)----
  (function(){
    if(!all.length) return renderHub();
    var remaining = all.length;
    all.forEach(function(item){
      var s = document.createElement('script'); s.src = item.file;
      s.onload = s.onerror = function(){ if(--remaining === 0) renderHub(); };
      document.body.appendChild(s);
    });
  })();

  function renderHub(){
    var B = window.BANKS || {};
    var pastQ = 0, lawQuizQ = 0, examWrong = 0;
    all.forEach(function(x){
      var bk = B[x.id]; if(!bk) return;
      var q = (bk.mcq?bk.mcq.length:0) + (bk.cloze?bk.cloze.length:0);
      if(x.law){ lawQuizQ += q; } else { pastQ += q; }
      examWrong += (window.Store ? Store.bankWrongCount(x.id) : 0);
    });
    var E = encodeURIComponent(subj);
    var icon = subj === '警察法規' ? '🚓' : subj === '法學知識與英文' ? '⚖️' : subj === '行政法' ? '🏛️' : '📚';
    var cards = '';
    if(subj === '英文'){
      cards += '<a class="card" href="vocab.html?subject=' + E + '">'
        + '<div class="title"><span class="emo">📇</span> 單字卡</div>'
        + '<div class="desc">翻卡記憶 · 🔊 發音 · 例句 · 同義字</div></a>';
    }
    if(lawBanks.length){
      cards += '<a class="card" href="subject.html?subject=' + E + '&view=laws">'
        + '<div class="title"><span class="emo">' + rdIcon + '</span> ' + rdLabel + '</div>'
        + '<div class="desc">' + (isGuowen ? (lawBanks.length + ' 組名言佳句,可閱讀、搜尋') : (lawBanks.length + ' 部法規完整條文,可閱讀、搜尋')) + '</div></a>';
    }
    if(pastQ > 0){
      var pastLabel = (subj==='英文') ? '單字測驗' : '歷年考古題';
      var pastDesc = (subj==='英文') ? ('全部單字混合測驗,共 '+pastQ+' 題') : ('考選部官方歷年題目,共 '+pastQ+' 題');
      cards += '<a class="card" href="review.html?subject=' + E + '&type=past">'
        + '<div class="title"><span class="emo">✍️</span> ' + pastLabel + '</div>'
        + '<div class="desc">' + pastDesc + '</div></a>';
    }
    if(lawQuizQ > 0){
      cards += '<a class="card" href="review.html?subject=' + E + '&type=law">'
        + '<div class="title"><span class="emo">📝</span> 法條拆解題</div>'
        + '<div class="desc">依法條時限/主體/列舉拆題,共 ' + lawQuizQ + ' 題</div></a>';
    }
    cards += '<a class="card" href="review.html">'
      + '<div class="title"><span class="emo">🎯</span> 總複習</div>'
      + '<div class="desc">跨科目綜合測驗 · 我的錯題</div></a>';

    page.innerHTML = '<div class="page-icon">' + icon + '</div>'
      + '<h1 class="page-title">' + esc(subj) + '</h1>'
      + '<p class="page-sub">選擇複習方式</p>'
      + '<div class="grid">' + cards + '</div>';
  }
})();
</script>
</body>
</html>
