<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>法規練習</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="topbar">
  <a class="back" href="law-index.html">‹ 返回</a>
  <h1 id="lawName">載入中…<span class="sub" id="lawMeta"></span></h1>
</div>

<div class="wrap">
  <div class="tabs">
    <button data-mode="read" class="active">📖 法條</button>
    <button data-mode="mcq">✍️ 選擇題</button>
    <button data-mode="cloze">⬜ 填空題</button>
    <button data-mode="wrong">❗ 錯題</button>
  </div>
  <div id="view"></div>
</div>

<div class="footer-note">
  法條來源:全國法規資料庫 law.moj.gov.tw　·　<span id="srcMeta"></span>
</div>

<script src="assets/store.js"></script>
<script src="assets/engine.js"></script>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var law = (params.get('law') || '').replace(/[^a-z0-9\-_]/gi, '');
  var view = document.getElementById('view');
  if(!law){ view.innerHTML = '<div class="empty">找不到法規。</div>'; return; }
  var s = document.createElement('script');
  s.src = 'data/' + law + '.js';
  s.onload = function(){ PE.initLawPage(law); };
  s.onerror = function(){ view.innerHTML = '<div class="empty">此法規題庫尚未建立。</div>'; };
  document.body.appendChild(s);
})();
</script>
</body>
</html>
